<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Automation Dashboard</title>
    <link rel="stylesheet" href="/static/style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-decor decor-1"></div>
    <div class="background-decor decor-2"></div>

    <div class="container">
        <header>
            <h1>서비스 통합 제어</h1>
        </header>

        <section class="auth-section glass-panel">
            <h2>서버 접속 정보 및 스캔</h2>
            <form id="credentials-form" onsubmit="event.preventDefault(); discoverServices();">
                <div class="input-group">
                    <label for="host">Host IP</label>
                    <input type="text" id="host" required placeholder="e.g. 192.168.1.100">
                </div>
                <div class="input-group">
                    <label for="port">SSH Port</label>
                    <input type="number" id="port" value="10022" required>
                </div>
                <div class="input-group">
                    <label for="username">Discovery Username</label>
                    <input type="text" id="username" required placeholder="e.g. jksadmin">
                </div>
                <div class="input-group">
                    <label for="password">Discovery Password</label>
                    <input type="password" id="password" required placeholder="SSH Password">
                </div>

                <!-- Target Services Checkboxes -->
                <div class="input-group" style="grid-column: 1 / -1; margin-top: 0.5rem;">
                    <label>스캔 대상 선택 (Target Services)</label>
                    <div
                        style="display: flex; flex-direction: column; gap: 1rem; align-items: flex-start; margin-top: 0.5rem; background: rgba(15, 23, 42, 0.6); padding: 1.2rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1);">
                        <label
                            style="color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" class="chk-target" value="oracle" checked
                                style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                            <div
                                style="width: 1.5rem; height: 1.5rem; background-color: #F80000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 0.1rem;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" style="width: 65%; height: 65%;">
                                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                                </svg>
                            </div> Oracle DB
                        </label>
                        <label
                            style="color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" class="chk-target" value="postgres" checked
                                style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Postgresql_elephant.svg"
                                alt="PostgreSQL" style="height: 1.4rem;"> PostgreSQL
                        </label>
                        <label
                            style="color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" class="chk-target" value="rts" checked
                                style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                            <img src="/static/maxgauge.png" alt="MaxGauge RTS"
                                style="height: 1.4rem; object-fit: contain;" onerror="this.style.display='none'"> RTS
                            Process
                        </label>
                        <label
                            style="color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" class="chk-target" value="dg" checked
                                style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                            <img src="/static/maxgauge.png" alt="MaxGauge DG"
                                style="height: 1.4rem; object-fit: contain; filter: hue-rotate(180deg);"
                                onerror="this.style.display='none'"> DataGather
                        </label>
                        <label
                            style="color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" class="chk-target" value="pjs" checked
                                style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                            <img src="/static/maxgauge.png" alt="MaxGauge PlatformJS"
                                style="height: 1.4rem; object-fit: contain; filter: hue-rotate(90deg);"
                                onerror="this.style.display='none'"> PlatformJS
                        </label>
                    </div>
                </div>

                <div class="input-group" style="grid-column: 1 / -1; justify-content: flex-end; align-items: flex-end;">
                    <button type="submit" class="btn check-btn"
                        style="width: 100%; height: 100%; font-size: 1.1rem; margin-top: 1.25rem;" id="discover-btn">
                        서버 스캔 시작 (Discover)
                    </button>
                </div>
            </form>
        </section>

        <!-- Dynamic Container for Discovered Services -->
        <section class="services-dashboard" id="dynamic-dashboard">
            <!-- Cards will be injected here by app.js -->
        </section>
    </div>

    <script src="/static/app.js?v=13"></script>
</body>

</html>
